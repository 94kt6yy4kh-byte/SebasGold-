<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SebasGold - Plataforma Pro de Liquidación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-principal: #090d16; --bg-card: #111b2d; --oro: #f1c40f; --texto: #f8f9fa; --borde: #1e293b; --exito: #2ecc71; --alerta: #e74c3c; --transicion: all 0.3s ease; }
        .light-mode { --bg-principal: #f4f6f9; --bg-card: #ffffff; --texto: #0f172a; --borde: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .contenedor { background-color: var(--bg-card); border-radius: 28px; width: 100%; max-width: 480px; padding: 25px; border: 1px solid var(--borde); }
        .grupo-input { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #8a99ad; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        input { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid var(--borde); padding: 12px; border-radius: 12px; color: var(--texto); font-size: 15px; font-weight: 700; }
        .btn-accion { width: 100%; background-color: var(--oro); color: #000; border: none; padding: 15px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .resultado-box { background: rgba(241,196,15,0.06); border: 1px solid rgba(241,196,15,0.15); padding: 18px; border-radius: 16px; text-align: center; margin: 20px 0; }
        .precio-final { font-size: 32px; color: var(--oro); font-weight: 800; }
        .alerta-densidad { padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; font-weight: 700; font-size: 12px; display: none; }
        .pestanas { display: flex; gap: 5px; margin-bottom: 20px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 14px; }
        .pestana { flex: 1; color: #8a99ad; padding: 12px 5px; border-radius: 10px; cursor: pointer; font-weight: 700; text-align: center; font-size: 12px; }
        .pestana.activa { background-color: var(--oro); color: #090d16; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1 style="color:var(--oro); text-align:center; margin-bottom:20px;">🪙 SebasGold Pro</h1>

    <div class="grupo-input">
        <label>Cotización Oro 24K:</label>
        <input type="number" id="cotizacionBase" oninput="guardarConfig(); calcularTodo()">
    </div>
    <div class="grupo-input">
        <label>Margen Compra (%):</label>
        <input type="number" id="margenCompra" oninput="guardarConfig(); calcularTodo()">
    </div>

    <div class="pestanas">
        <div id="tabCompra" class="pestana activa" onclick="cambiarTab('compra')">⚡ Compra</div>
        <div id="tabDensidad" class="pestana" onclick="cambiarTab('densidad')">⚖️ Arquímedes</div>
    </div>

    <div id="seccionCotizador">
        <input type="number" id="kilataje" placeholder="Kilataje" oninput="calcularTodo()">
        <input type="number" id="pesoMaterial" placeholder="Peso Neto (g)" oninput="calcularTodo()">
        <div class="resultado-box">
            <h2>VALOR TOTAL</h2>
            <div id="valorFinalDisplay" class="precio-final">$ 0</div>
        </div>
        <button class="btn-accion" onclick="generarPDFRecibo()">📄 Imprimir Comprobante</button>
    </div>

    <div id="seccionDensidad" style="display:none;">
        <input type="number" id="pesoSeco" placeholder="Peso Seco (g)" oninput="calcularDensidad()">
        <input type="number" id="pesoAgua" placeholder="Peso Agua (g)" oninput="calcularDensidad()">
        <div id="densidadDisplay" style="text-align:center; margin:20px 0; font-size:24px;">0.00 g/cm³</div>
        <div id="veredictoBox" class="alerta-densidad"></div>
    </div>
</div>

<script>
    // 1. Carga inicial desde LocalStorage
    window.onload = () => {
        document.getElementById("margenCompra").value = localStorage.getItem("margen") || 16.7;
        document.getElementById("cotizacionBase").value = localStorage.getItem("cotizacion") || 0;
        calcularTodo();
    };

    function guardarConfig() {
        localStorage.setItem("margen", document.getElementById("margenCompra").value);
        localStorage.setItem("cotizacion", document.getElementById("cotizacionBase").value);
    }

    // 2. Lógica de Densidad con tabla de aleaciones real
    function calcularDensidad() {
        const seco = parseFloat(document.getElementById("pesoSeco").value) || 0;
        const agua = parseFloat(document.getElementById("pesoAgua").value) || 0;
        const vBox = document.getElementById("veredictoBox");
        
        if (seco <= agua || agua === 0) return;

        const densidad = seco / (seco - agua);
        document.getElementById("densidadDisplay").innerText = densidad.toFixed(2) + " g/cm³";

        const tabla = { 10: 11.6, 14: 13.1, 18: 15.6, 22: 17.8, 24: 19.32 };
        let kFinal = 18;
        let menorDif = 100;
        
        for (let k in tabla) {
            let dif = Math.abs(tabla[k] - densidad);
            if (dif < menorDif) { menorDif = dif; kFinal = k; }
        }
        
        document.getElementById("kilataje").value = kFinal;
        vBox.style.display = "block";
        vBox.innerText = `Estimado por tabla: ${kFinal}K`;
        vBox.style.background = "rgba(241,196,15,0.1)";
        vBox.style.color = "var(--oro)";
        calcularTodo();
    }

    function calcularTodo() {
        const base = parseFloat(document.getElementById("cotizacionBase").value) || 0;
        const k = parseFloat(document.getElementById("kilataje").value) || 0;
        const peso = parseFloat(document.getElementById("pesoMaterial").value) || 0;
        const margen = parseFloat(document.getElementById("margenCompra").value) || 0;
        
        const valor = ((base / 24) * k * (1 - (margen/100))) * peso;
        document.getElementById("valorFinalDisplay").innerText = "$ " + Math.round(valor).toLocaleString();
    }

    function cambiarTab(tipo) {
        document.getElementById("tabCompra").classList.toggle("activa", tipo === 'compra');
        document.getElementById("tabDensidad").classList.toggle("activa", tipo === 'densidad');
        document.getElementById("seccionCotizador").style.display = tipo === 'compra' ? 'block' : 'none';
        document.getElementById("seccionDensidad").style.display = tipo === 'densidad' ? 'block' : 'none';
    }

    function generarPDFRecibo() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("RECIBO SEBASGOLD", 20, 20);
        doc.text("Valor a pagar: " + document.getElementById("valorFinalDisplay").innerText, 20, 30);
        doc.save("Comprobante_SebasGold.pdf");
    }
</script>
</body>
</html>
